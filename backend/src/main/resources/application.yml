server:
  port: 8080
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/travelcrm}
    username: ${DB_USER:travelcrm}
    password: ${DB_PASSWORD:travelcrm}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB
jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-256-bit-key-minimum-chars}
  expiration: 86400000
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
app:
  upload:
    dir: uploads
